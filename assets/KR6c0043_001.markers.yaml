  - {type: variant, offset: 2990, length: 118, content: 此結上文而證勸也。不應取法者，空能觀之智也；不應取非法者，空所觀之境也。論云：「法有性相尚不應取，何況非法本無性相？」又云：「善如法尚不取，況不善非法？」疏云：「今言法者，說五陰空為法，五陰相為非法，即以陰空為藥名法陰，有為病名非法。陰病既除，空藥亦遣，非法既謝，在法亦亡。」與論意正相㳷合。, 宮: 我人眾生壽者四相該乎生法二執生即眾生假名也法乃五陰實法也亦名我我所此二執中各有性相二執此二執非性相二空妙觀不能破也故龍樹云於生於法破性破相謂於假名中破性相二執於實法中亦破性相二執也不應取法者忘能觀之智也不應取非法忘所觀之境也所觀如病觀智如藥境智俱泯如病去藥忘也}
