  - {type: variant, offset: 2778, length: 99, content: 該乎生、法二空。論云：「有智慧者，了知生、法二無我故。」又云：「生法各有四種想。」想即相也，言無復我、人、眾生、壽者四相，此生空也。言無法相亦無非法相者，他譯更有無相亦非無相，此法空也。疏云：「初列生空有四相，次列法空但有兩句，法非法也，蓋譯人略之耳。」, 宮: 若有四相生信不深得法不廣其福德無量者為無此四相也無法相者相執報空也亦無非法者性執空也}
