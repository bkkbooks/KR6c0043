  - {type: variant, offset: 3108, length: 65, content: 言筏喻者，論云：「如欲濟川，先應取筏，至彼岸已，捨之而去。」又，《智論》引《筏喻經》云：「汝等若解我筏喻法，是時善法宜應棄捨，況不善法？」斯乃無所得之要術，俾不凝滯於物矣。, 宮: （（言如筏喻者筏乃渡河之具到彼岸則不用之借喻法尚應捨何況非法））二十八字}
